# Vinayana Infra — production stack.
#   frontend (nginx)  ->  public on port 80, proxies /api to backend
#   backend  (Go API) ->  internal only, persists enquiries to a volume
#
# Secrets (SMTP) are read from a .env file in this folder. Copy .env.example
# to .env and fill it in before deploying.

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: "8090"
      DATA_FILE: "/data/contacts.json"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_FROM: "${MAIL_FROM:-}"
      MAIL_TO: "${MAIL_TO:-info@vinayanainfra.com}"
    volumes:
      - contacts-data:/data
    expose:
      - "8090"          # internal only — reachable by the frontend, not the public

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8099:80"       # host port 8099 → container 80; host nginx proxies the domain to it

volumes:
  contacts-data:
